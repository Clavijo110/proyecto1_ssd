services:
  - type: web
    name: fhir-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fhir-db
          property: connectionString
      - key: ENCRYPTION_KEY
        generateValue: true
