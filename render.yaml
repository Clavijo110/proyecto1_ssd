# Render Blueprint - comandos desde raíz del repo
services:
  - type: web
    name: proyecto1-ssd-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
